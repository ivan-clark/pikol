<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f8fb" />
    <meta
      name="description"
      content="Pikol is a fair 2v2 game matcher with MMR, history, and insights."
    />
    <link rel="icon" type="image/png" href="/pickleball.png" />
    <link rel="apple-touch-icon" href="/pickleball.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Pikol</title>
    <script>
      // Apply saved/system theme before paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var stored = localStorage.getItem('pikol-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
